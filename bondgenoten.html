<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>de Bondgenoten — Dieuw in Thailand</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div class="eyebrow">DIEUW IN THAILAND</div>
      <h1>de Bondgenoten</h1>
    </header>

    <nav class="inner-tabs">
      <button class="inner-tab inner-tab--actief" data-tab="tijdlijn">Tijdlijn</button>
      <button class="inner-tab" data-tab="kandidaten">Bondjes</button>
    </nav>

    <main>
      <section id="tab-tijdlijn">
        <div class="kijkbalk" style="margin-top:12px;">
          <a class="knop knop--groen" id="kijklink" href="#" target="_blank" rel="noopener">▶ Kijk de aflevering op KIJK</a>
        </div>
        <p class="vpn-tip">Tip: zet je VPN op een Nederlandse server, anders doet KIJK moeilijk. 🌏</p>
        <div id="tijdlijn" class="tijdlijn">
          <p class="leeg">Laden…</p>
        </div>
      </section>

      <section id="tab-kandidaten" hidden>
        <div id="bondgenoten-lijst"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/kandidaten.js"></script>
  <script src="js/app.js"></script>
  <script src="js/bondgenoten.js"></script>
  <script src="js/nav.js"></script>
  <script>
    document.querySelectorAll(".inner-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".inner-tab").forEach(t => t.classList.remove("inner-tab--actief"));
        tab.classList.add("inner-tab--actief");
        document.querySelectorAll("main > section").forEach(s => s.hidden = true);
        document.getElementById("tab-" + tab.dataset.tab).hidden = false;
      });
    });
  </script>
</body>
</html>
