<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Berichten — Dieuw in Thailand</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .berichten-lijst {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .bericht-kaart {
      background: var(--kaart);
      border: 1px solid var(--lijn);
      border-radius: var(--radius);
      box-shadow: var(--schaduw);
      padding: 16px;
      position: relative;
    }

    .bericht-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .bericht-naam {
      font-size: 12px;
      font-weight: 700;
      color: var(--moonstone);
      letter-spacing: 0.05em;
    }

    .bericht-datum {
      font-size: 11px;
      color: var(--inkt-zacht);
      margin-left: auto;
      flex-shrink: 0;
    }

    .bericht-verwijder {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--inkt-zacht);
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      opacity: 0.4;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .bericht-verwijder:hover {
      opacity: 1;
      color: #a4432f;
    }

    .bericht-tekst {
      font-size: 15px;
      line-height: 1.65;
      color: var(--inkt);
      white-space: pre-wrap;
      margin: 0;
    }

    .bericht-foto {
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-top: 12px;
    }

    .bericht-caption {
      font-size: 12px;
      color: var(--inkt-zacht);
      text-align: center;
      font-style: italic;
      margin-top: 6px;
    }

    .berichten-leeg {
      text-align: center;
      padding: 48px 0 32px;
      color: var(--inkt-zacht);
      font-size: 15px;
    }

    .berichten-leeg-emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    .berichten-laden {
      text-align: center;
      padding: 40px 0;
      color: var(--inkt-zacht);
      font-size: 14px;
    }

    .plaatsen-sectie { margin-top: 18px; }

    .plaatsen-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--kaart);
      border: 1.5px dashed var(--lijn);
      border-radius: var(--radius);
      padding: 13px 16px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--inkt-zacht);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }

    .plaatsen-toggle:hover {
      border-color: var(--moonstone);
      color: var(--inkt);
    }

    .plaatsen-paneel {
      background: var(--kaart);
      border: 1px solid var(--lijn);
      border-radius: var(--radius);
      box-shadow: var(--schaduw);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .plaatsen-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--inkt-zacht);
      display: grid;
      gap: 6px;
    }

    .plaatsen-input,
    .plaatsen-textarea {
      font: inherit;
      font-size: 15px;
      border: 1.5px solid var(--lijn);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
      background: var(--papier);
      color: var(--inkt);
      box-sizing: border-box;
    }

    .plaatsen-textarea { min-height: 90px; resize: vertical; }

    .plaatsen-input:focus,
    .plaatsen-textarea:focus {
      outline: 2px solid var(--moonstone);
      outline-offset: 1px;
      border-color: var(--moonstone);
    }

    .plaatsen-rij { display: flex; gap: 8px; }
    .plaatsen-rij .knop { flex: 1; text-align: center; }

    .dagbericht {
      background: linear-gradient(135deg, #7c4a5c 0%, var(--blackhills) 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px 22px 24px;
      margin-top: 18px;
      text-align: center;
      box-shadow: var(--schaduw);
    }

    .dagbericht-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 14px;
    }

    .dagbericht-tekst {
      font-family: "Space Grotesk", sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 14px;
    }

    .dagbericht-van {
      font-size: 12px;
      opacity: 0.65;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div class="eyebrow">DIEUW IN THAILAND</div>
      <h1>💌 Berichten</h1>
    </header>

    <div class="dagbericht" id="dagbericht"></div>

    <div class="plaatsen-sectie" id="plaatsen-sectie">
      <button class="plaatsen-toggle" id="plaatsen-toggle">✏️ Bericht plaatsen</button>
      <form class="plaatsen-paneel" id="post-form" hidden>
        <label class="plaatsen-label">Jouw naam
          <input class="plaatsen-input" type="text" id="pl-naam" placeholder="bijv. Mitch" required />
        </label>
        <label class="plaatsen-label">Bericht
          <textarea class="plaatsen-textarea" id="pl-noot" placeholder="Schrijf iets liefs…" required></textarea>
        </label>
        <div class="plaatsen-rij">
          <button class="knop knop--groen" type="submit" id="pl-verstuur">Versturen</button>
        </div>
        <div class="status" id="pl-status"></div>
      </form>
    </div>

    <div class="berichten-lijst" id="berichten-lijst">
      <div class="berichten-laden">Berichten laden…</div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const fmtDatum = new Intl.DateTimeFormat("nl-NL", {
      weekday: "long", day: "numeric", month: "long"
    });

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function laadBerichten() {
      const lijst = document.getElementById("berichten-lijst");
      try {
        const res = await fetch(
          SUPABASE_URL + "posts?order=created_at.desc&select=*",
          { headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY } }
        );
        const berichten = await res.json();

        if (!berichten.length) {
          lijst.innerHTML = `
            <div class="berichten-leeg">
              <span class="berichten-leeg-emoji">💬</span>
              Nog geen berichten
            </div>`;
          return;
        }

        lijst.innerHTML = "";
        for (const b of berichten) {
          const kaart = document.createElement("div");
          kaart.className = "bericht-kaart";
          kaart.dataset.id = b.id;

          let html = `
            <div class="bericht-meta">
              <span class="bericht-naam">${escHtml(b.naam || "Anoniem")}</span>
              <span class="bericht-datum">${fmtDatum.format(new Date(b.created_at))}</span>
              <button class="bericht-verwijder" title="Verwijderen">🗑</button>
            </div>`;

          if (b.note) html += `<p class="bericht-tekst">${escHtml(b.note)}</p>`;
          if (b.photo_url) html += `<img class="bericht-foto" src="${escHtml(b.photo_url)}" alt="${escHtml(b.photo_caption || "")}" loading="lazy">`;
          if (b.photo_caption) html += `<div class="bericht-caption">${escHtml(b.photo_caption)}</div>`;

          kaart.innerHTML = html;

          kaart.querySelector(".bericht-verwijder").addEventListener("click", () => verwijder(b.id, kaart));

          lijst.appendChild(kaart);
        }
      } catch (e) {
        lijst.innerHTML = `<div class="leeg">Kon berichten niet laden. Probeer het later opnieuw.</div>`;
      }
    }

    async function verwijder(id, kaart) {
      if (!confirm("Bericht verwijderen?")) return;
      try {
        const res = await fetch(SUPABASE_URL + "posts?id=eq." + id, {
          method: "DELETE",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: "Bearer " + SUPABASE_ANON_KEY,
          },
        });
        if (!res.ok) throw new Error("status " + res.status);
        kaart.remove();
      } catch (e) {
        alert("Verwijderen mislukt: " + e.message);
      }
    }

    document.getElementById("plaatsen-toggle").addEventListener("click", () => {
      const form = document.getElementById("post-form");
      form.hidden = !form.hidden;
    });

    document.getElementById("post-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const knop = document.getElementById("pl-verstuur");
      const status = document.getElementById("pl-status");
      knop.disabled = true;
      status.textContent = "Bezig…";
      status.className = "status";

      try {
        const naam = document.getElementById("pl-naam").value.trim();
        const noot = document.getElementById("pl-noot").value.trim();

        const res = await fetch(SUPABASE_URL + "posts", {
          method: "POST",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: "Bearer " + SUPABASE_ANON_KEY,
            "Content-Type": "application/json",
            Prefer: "return=minimal",
          },
          body: JSON.stringify({ naam, note: noot, kind: "thuis" }),
        });

        if (!res.ok) throw new Error("status " + res.status);

        status.textContent = "Verstuurd! ❤️";
        status.className = "status status--ok";
        document.getElementById("post-form").reset();
        await laadBerichten();
      } catch (err) {
        status.textContent = "Mislukt: " + err.message;
        status.className = "status status--fout";
      } finally {
        knop.disabled = false;
      }
    });

    const DAGBERICHTEN = [
      "Je bent mooi",
      "Je bent knap",
      "Je bent geweldig",
      "Je lacht het mooiste",
      "Je bent zo sterk",
      "Je bent bijzonder",
      "Je maakt me blij",
      "Je bent uniek",
      "Je doet het geweldig",
      "Je bent een schat",
      "Jij bent genoeg",
      "Je bent zo lief",
      "Ik ben trots op jou",
      "Je bent prachtig",
      "Je bent een straal van licht",
      "Je bent onvervangbaar",
      "Je bent een avontuur waard",
      "Je hebt het mooiste hart",
      "Je bent de leukste",
      "Je straalt",
    ];

    function toonDagbericht() {
      const el = document.getElementById("dagbericht");
      if (!el) return;
      const nu = new Date();
      const dagVanHetJaar = Math.floor((nu - new Date(nu.getFullYear(), 0, 0)) / 86400000);
      const bericht = DAGBERICHTEN[dagVanHetJaar % DAGBERICHTEN.length];
      el.innerHTML = `
        <div class="dagbericht-label">Bericht van Mitch</div>
        <p class="dagbericht-tekst">${bericht}</p>
        <div class="dagbericht-van">— Mitch ❤️</div>`;
    }

    toonDagbericht();
    laadBerichten();
  </script>
</body>
</html>
