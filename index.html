<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Dieuw in Thailand</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div class="eyebrow">Backpack trip met Dagmar</div>
      <h1>DIEUW IN THAILAND</h1>

      <div class="klokken">
        <div class="klok">
          <div class="zone">Nederland</div>
          <time id="klokNL">--:--:--</time>
          <div class="datum" id="datumNL"></div>
        </div>
        <div class="klok klok--thai">
          <div class="zone">Thailand</div>
          <time id="klokTH">--:--:--</time>
          <div class="datum" id="datumTH"></div>
        </div>
      </div>

      <div class="dagteller">
        <strong id="dagteller">Dag – van –</strong>
        <span id="aftel"></span>
      </div>
      <div class="voortgang"><i id="voortgang" style="width:0%"></i></div>

      <div class="kijkbalk">
        <a class="knop knop--groen" id="kijklink" href="#" target="_blank" rel="noopener">Kijk de aflevering op KIJK</a>
      </div>
      <p class="vpn-tip">Tip: zet je VPN op een Nederlandse server, anders doet KIJK moeilijk. 🌏</p>
    </header>

    <nav class="tabs">
      <a href="index.html" aria-current="page">Tijdlijn</a>
      <a href="bondgenoten.html">Bondgenoten</a>
      <a href="vluchten.html">Vluchten</a>
    </nav>

    <main>
      <div id="tijdlijn" class="tijdlijn">
        <p class="leeg">Laden…</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/klokken.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
